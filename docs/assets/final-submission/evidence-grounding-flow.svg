<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">Evidence grounding flow</title>
  <desc id="desc">PyPi-AI forces AI explanations to cite valid evidence identifiers before they enter a report.</desc>
  <defs>
    <style>
      .box{fill:#f8fafc;stroke:#111827;stroke-width:2}.good{fill:#ecfdf5;stroke:#16a34a;stroke-width:2}.bad{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.ai{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.txt{font-family:Arial,Helvetica,sans-serif;font-size:20px;fill:#111827}.small{font-size:16px}.title{font-size:32px;font-weight:700}.arrow{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}.caption{font-size:17px;fill:#374151}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 z" fill="#111827"/></marker>
  </defs>
  <rect width="1180" height="640" fill="#fff"/>
  <text x="590" y="50" text-anchor="middle" class="txt title">Evidence-Grounded AI Explanation Pipeline</text>
  <rect x="60" y="130" width="190" height="90" rx="14" class="box"/>
  <text x="155" y="165" text-anchor="middle" class="txt">Findings</text>
  <text x="155" y="191" text-anchor="middle" class="txt small">F001, F002...</text>
  <rect x="315" y="130" width="190" height="90" rx="14" class="box"/>
  <text x="410" y="160" text-anchor="middle" class="txt">Skill Prompt</text>
  <text x="410" y="188" text-anchor="middle" class="txt small">evidence-only rules</text>
  <rect x="570" y="130" width="210" height="90" rx="14" class="ai"/>
  <text x="675" y="160" text-anchor="middle" class="txt">Model Provider</text>
  <text x="675" y="188" text-anchor="middle" class="txt small">Ollama / Gemini</text>
  <rect x="845" y="130" width="245" height="90" rx="14" class="box"/>
  <text x="968" y="160" text-anchor="middle" class="txt">Draft Explanation</text>
  <text x="968" y="188" text-anchor="middle" class="txt small">sentences must cite IDs</text>
  <path d="M250 175 L315 175" class="arrow"/>
  <path d="M505 175 L570 175" class="arrow"/>
  <path d="M780 175 L845 175" class="arrow"/>
  <rect x="425" y="310" width="330" height="100" rx="16" class="box"/>
  <text x="590" y="345" text-anchor="middle" class="txt">Evidence Verifier</text>
  <text x="590" y="375" text-anchor="middle" class="txt small">Does every sentence map to a known evidence ID?</text>
  <path d="M968 220 C968 280,755 280,755 340" class="arrow"/>
  <rect x="150" y="475" width="270" height="85" rx="14" class="bad"/>
  <text x="285" y="510" text-anchor="middle" class="txt">Reject Claim</text>
  <text x="285" y="538" text-anchor="middle" class="txt small">unsupported sentence removed</text>
  <rect x="760" y="475" width="270" height="85" rx="14" class="good"/>
  <text x="895" y="510" text-anchor="middle" class="txt">Accept Report Text</text>
  <text x="895" y="538" text-anchor="middle" class="txt small">grounded in FIDs</text>
  <path d="M500 410 C440 455,365 455,285 475" class="arrow"/>
  <path d="M680 410 C740 455,815 455,895 475" class="arrow"/>
  <text x="590" y="610" text-anchor="middle" class="txt caption">Figure 3.2: Evidence verifier prevents unsupported AI claims</text>
</svg>
