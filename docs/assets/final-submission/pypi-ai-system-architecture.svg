<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">PyPi-AI system architecture</title>
  <desc id="desc">Static package inputs pass through safe extraction, metadata parsing, AST and rule analysis, evidence storage, risk scoring, AI explanation verification, and report output.</desc>
  <defs>
    <style>
      .bg{fill:#ffffff}.box{fill:#f8fafc;stroke:#111827;stroke-width:2}.core{fill:#ecfeff;stroke:#0891b2;stroke-width:3}.safe{fill:#f0fdf4;stroke:#16a34a;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.out{fill:#f9fafb;stroke:#4b5563;stroke-width:2}.txt{font-family:Arial,Helvetica,sans-serif;font-size:21px;fill:#111827}.small{font-size:17px}.title{font-size:34px;font-weight:700}.arrow{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:8 8}.caption{font-size:18px;fill:#374151}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 z" fill="#111827"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text x="640" y="52" text-anchor="middle" class="txt title">PyPi-AI Evidence-Grounded Static Analysis Architecture</text>
  <text x="640" y="84" text-anchor="middle" class="txt caption">No scanned package is installed, imported, or executed</text>

  <rect x="45" y="135" width="250" height="455" rx="18" class="box"/>
  <text x="170" y="170" text-anchor="middle" class="txt" font-weight="700">Scan Targets</text>
  <rect x="80" y="205" width="180" height="55" rx="10" class="out"/>
  <text x="170" y="240" text-anchor="middle" class="txt small">Package Folder</text>
  <rect x="80" y="285" width="180" height="55" rx="10" class="out"/>
  <text x="170" y="320" text-anchor="middle" class="txt small">Wheel (.whl)</text>
  <rect x="80" y="365" width="180" height="55" rx="10" class="out"/>
  <text x="170" y="400" text-anchor="middle" class="txt small">Sdist (.tar.gz)</text>
  <rect x="80" y="445" width="180" height="55" rx="10" class="out"/>
  <text x="170" y="480" text-anchor="middle" class="txt small">Virtualenv (.venv)</text>
  <rect x="80" y="525" width="180" height="45" rx="10" class="safe"/>
  <text x="170" y="554" text-anchor="middle" class="txt small">Safe Fixtures</text>

  <rect x="380" y="120" width="520" height="495" rx="22" class="core"/>
  <text x="640" y="158" text-anchor="middle" class="txt" font-weight="700">Scanner Core</text>
  <rect x="425" y="195" width="205" height="58" rx="10" class="safe"/>
  <text x="528" y="219" text-anchor="middle" class="txt small">Safe Extractor</text>
  <text x="528" y="241" text-anchor="middle" class="txt small">path, size, count checks</text>
  <rect x="650" y="195" width="205" height="58" rx="10" class="box"/>
  <text x="753" y="219" text-anchor="middle" class="txt small">Metadata Parser</text>
  <text x="753" y="241" text-anchor="middle" class="txt small">dist-info, PKG-INFO, TOML</text>
  <rect x="425" y="290" width="205" height="58" rx="10" class="box"/>
  <text x="528" y="314" text-anchor="middle" class="txt small">AST Analyzer</text>
  <text x="528" y="336" text-anchor="middle" class="txt small">Python syntax only</text>
  <rect x="650" y="290" width="205" height="58" rx="10" class="box"/>
  <text x="753" y="314" text-anchor="middle" class="txt small">Rule Engine</text>
  <text x="753" y="336" text-anchor="middle" class="txt small">8 static detectors</text>
  <rect x="425" y="385" width="205" height="58" rx="10" class="warn"/>
  <text x="528" y="409" text-anchor="middle" class="txt small">Evidence Store</text>
  <text x="528" y="431" text-anchor="middle" class="txt small">path, line, snippet</text>
  <rect x="650" y="385" width="205" height="58" rx="10" class="warn"/>
  <text x="753" y="409" text-anchor="middle" class="txt small">Risk Scorer</text>
  <text x="753" y="431" text-anchor="middle" class="txt small">weighted severity</text>
  <rect x="425" y="480" width="430" height="72" rx="10" class="safe"/>
  <text x="640" y="507" text-anchor="middle" class="txt small">AI Explanation Layer</text>
  <text x="640" y="531" text-anchor="middle" class="txt small">Ollama local default, Ollama Cloud/Gemini optional, evidence verifier enforced</text>

  <rect x="985" y="135" width="250" height="455" rx="18" class="box"/>
  <text x="1110" y="170" text-anchor="middle" class="txt" font-weight="700">Outputs</text>
  <rect x="1020" y="205" width="180" height="55" rx="10" class="out"/>
  <text x="1110" y="240" text-anchor="middle" class="txt small">Terminal Tables</text>
  <rect x="1020" y="285" width="180" height="55" rx="10" class="out"/>
  <text x="1110" y="320" text-anchor="middle" class="txt small">JSON Report</text>
  <rect x="1020" y="365" width="180" height="55" rx="10" class="out"/>
  <text x="1110" y="400" text-anchor="middle" class="txt small">HTML / PDF Report</text>
  <rect x="1020" y="445" width="180" height="55" rx="10" class="out"/>
  <text x="1110" y="480" text-anchor="middle" class="txt small">Evidence Citations</text>
  <rect x="1020" y="525" width="180" height="45" rx="10" class="safe"/>
  <text x="1110" y="554" text-anchor="middle" class="txt small">Verified Install</text>

  <path d="M295 360 C325 360,350 360,380 360" class="arrow"/>
  <path d="M900 360 C930 360,955 360,985 360" class="arrow"/>
  <path d="M528 253 L528 290" class="arrow"/>
  <path d="M753 253 L753 290" class="arrow"/>
  <path d="M528 348 L528 385" class="arrow"/>
  <path d="M753 348 L753 385" class="arrow"/>
  <path d="M528 443 L528 480" class="arrow"/>
  <path d="M753 443 L753 480" class="arrow"/>
  <path d="M640 552 L640 640 L1110 640 L1110 590" class="arrow dash"/>

  <text x="640" y="705" text-anchor="middle" class="txt caption">Figure 3.1: Proposed PyPi-AI static analysis architecture</text>
</svg>
