<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="650" viewBox="0 0 1180 650" role="img" aria-labelledby="title desc">
  <title id="title">Verified install flow</title>
  <desc id="desc">PyPi-AI install creates a virtual environment, downloads wheels, scans them, blocks risky packages, and installs only verified wheels.</desc>
  <defs>
    <style>
      .box{fill:#f8fafc;stroke:#111827;stroke-width:2}.safe{fill:#ecfdf5;stroke:#16a34a;stroke-width:2}.warn{fill:#fff7ed;stroke:#f97316;stroke-width:2}.block{fill:#fef2f2;stroke:#dc2626;stroke-width:2}.txt{font-family:Arial,Helvetica,sans-serif;font-size:20px;fill:#111827}.small{font-size:16px}.title{font-size:32px;font-weight:700}.arrow{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}.caption{font-size:17px;fill:#374151}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 z" fill="#111827"/></marker>
  </defs>
  <rect width="1180" height="650" fill="#fff"/>
  <text x="590" y="52" text-anchor="middle" class="txt title">Verified Package Installation Workflow</text>
  <rect x="70" y="135" width="200" height="80" rx="14" class="box"/>
  <text x="170" y="165" text-anchor="middle" class="txt">User Request</text>
  <text x="170" y="192" text-anchor="middle" class="txt small">pypi-ai install package</text>
  <rect x="335" y="135" width="200" height="80" rx="14" class="safe"/>
  <text x="435" y="165" text-anchor="middle" class="txt">Ensure .venv</text>
  <text x="435" y="192" text-anchor="middle" class="txt small">create if missing</text>
  <rect x="600" y="135" width="200" height="80" rx="14" class="warn"/>
  <text x="700" y="165" text-anchor="middle" class="txt">Download Wheels</text>
  <text x="700" y="192" text-anchor="middle" class="txt small">no source builds</text>
  <rect x="865" y="135" width="220" height="80" rx="14" class="box"/>
  <text x="975" y="165" text-anchor="middle" class="txt">Static Scan</text>
  <text x="975" y="192" text-anchor="middle" class="txt small">same evidence engine</text>
  <path d="M270 175 L335 175" class="arrow"/>
  <path d="M535 175 L600 175" class="arrow"/>
  <path d="M800 175 L865 175" class="arrow"/>
  <rect x="455" y="315" width="270" height="95" rx="16" class="box"/>
  <text x="590" y="350" text-anchor="middle" class="txt">Risk Threshold</text>
  <text x="590" y="380" text-anchor="middle" class="txt small">medium/high/critical gate</text>
  <path d="M975 215 C975 280,725 280,725 348" class="arrow"/>
  <rect x="170" y="500" width="260" height="90" rx="14" class="block"/>
  <text x="300" y="535" text-anchor="middle" class="txt">Block Install</text>
  <text x="300" y="563" text-anchor="middle" class="txt small">show evidence and report</text>
  <rect x="750" y="500" width="260" height="90" rx="14" class="safe"/>
  <text x="880" y="535" text-anchor="middle" class="txt">Install Locally</text>
  <text x="880" y="563" text-anchor="middle" class="txt small">pip --no-index from cache</text>
  <path d="M505 410 C445 455,370 470,300 500" class="arrow"/>
  <path d="M675 410 C735 455,810 470,880 500" class="arrow"/>
  <text x="590" y="625" text-anchor="middle" class="txt caption">Figure 4.4: Scan-before-install workflow for package safety</text>
</svg>
