name: CI

on:
  push:
    branches:
      - main
      - "review/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: uv sync --all-groups
      - name: Ruff
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy
      - name: Tests
        run: uv run pytest
